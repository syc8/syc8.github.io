<!DOCTYPE html>
<html lang="zh">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>账号复制</title>

		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			}

			body {
				background: #f5f6f8;
				padding: 20px;
			}

			.container {
				max-width: 640px;
				margin: auto;
				background: #fff;
				border-radius: 14px;
				padding: 24px;
				box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
			}

			h1 {
				font-size: 20px;
				margin-bottom: 18px;
				text-align: center;
			}

			.top-actions {
				margin-bottom: 16px;
			}

			.copy-all-btn {
				width: 100%;
				padding: 10px;
				border-radius: 8px;
				border: none;
				background: #111827;
				color: #fff;
				font-size: 14px;
				cursor: pointer;
				transition: 0.2s;
			}

			.copy-all-btn:active {
				transform: scale(0.97);
			}

			.copy-all-btn.success {
				background: #16a34a;
			}

			.line {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 12px;
				margin-bottom: 10px;
				background: #f9fafc;
				border-radius: 8px;
				transition: 0.2s;
			}

			.line:hover {
				background: #eef2ff;
			}

			.text {
				flex: 1;
				word-break: break-word;
				padding-right: 12px;
				font-size: 14px;
			}

			.copy-btn {
				border: none;
				padding: 6px 12px;
				border-radius: 6px;
				background: #4f46e5;
				color: #fff;
				cursor: pointer;
				font-size: 14px;
				transition: 0.2s;
				white-space: nowrap;
			}

			.copy-btn.success {
				background: #16a34a;
			}

			.copy-btn:active {
				transform: scale(0.95);
			}

			/* 移动端优化 */
			@media (max-width: 480px) {
				.line {
					flex-direction: column;
					align-items: flex-start;
				}

				.copy-btn {
					margin-top: 8px;
					width: 100%;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1>文本复制示例</h1>

			<div class="top-actions">
				<button class="copy-all-btn" onclick="copyAll(this)">全部复制</button>
			</div>

			<div class="line">
				<div class="text">x244939002 医𝕯𝕰𝕱𝕲𝕳𝕴𝕵 三只鱼 正</div>
				<button class="copy-btn" onclick="copySingle(this)">复制</button>
			</div>

			<div class="line">
				<div class="text">x244939003 枪𝔓𝔔𝔖𝔗 一只羊 正</div>
				<button class="copy-btn" onclick="copySingle(this)">复制</button>
			</div>

			<div class="line">
				<div class="text">x244939004 枪𝔓𝔔𝔖𝔗 二只羊 邪</div>
				<button class="copy-btn" onclick="copySingle(this)">复制</button>
			</div>

			<div class="line">
				<div class="text">x244939005 弓𝔓𝔔𝔖𝔗</div>
				<button class="copy-btn" onclick="copySingle(this)">复制</button>
			</div>

            <div class="line">
				<div class="text">x244939007 枪𝔓𝔔𝔖𝔗</div>
				<button class="copy-btn" onclick="copySingle(this)">复制</button>
			</div>
		</div>

		<script>
			function copySingle(button) {
				const text = button.parentElement.querySelector(".text").innerText;

				navigator.clipboard.writeText(text).then(() => {
					button.innerText = "已复制";
					button.classList.add("success");

					setTimeout(() => {
						button.innerText = "复制";
						button.classList.remove("success");
					}, 1200);
				});
			}

			function copyAll(button) {
				const texts = Array.from(document.querySelectorAll(".text"))
					.map((el) => el.innerText)
					.join("\n");

				navigator.clipboard.writeText(texts).then(() => {
					button.innerText = "已全部复制";
					button.classList.add("success");

					setTimeout(() => {
						button.innerText = "全部复制";
						button.classList.remove("success");
					}, 1500);
				});
			}
		</script>
	</body>
</html>
